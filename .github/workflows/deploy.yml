name: GitHub Pages デプロイ

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v6

      - name: Node.js セットアップ
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: 依存関係インストール
        run: npm ci

      - name: ビルド
        run: npm run build

      - name: Pages アーティファクト作成
        run: |
          tar --dereference --hard-dereference \
            --directory ./out \
            --exclude=.git \
            --exclude=.github \
            --exclude='.[^/]*' \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            .

      - name: Pages アーティファクトアップロード
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pages デプロイ
        id: deployment
        uses: actions/deploy-pages@v5
